name: Snapshot données de marché

on:
  schedule:
    - cron: '*/30 7-21 * * 1-5'   # toutes les 30 min, 7h-21h UTC, du lundi au vendredi
  workflow_dispatch:               # bouton de déclenchement manuel

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Installer les dépendances
        working-directory: back
        run: npm ci

      - name: Générer le snapshot
        working-directory: back
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: npm run snapshot

      - name: Publier si le snapshot a changé
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add front/data/snapshot.json
          if git diff --staged --quiet; then
            echo "Aucun changement de données."
          else
            git commit -m "chore: snapshot données de marché"
            git pull --rebase --autostash origin main
            git push
          fi
