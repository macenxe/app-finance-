name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-busting des assets par le SHA du commit
        # Remplace les ?v=NN manuels par le SHA court : plus besoin de penser à bumper la
        # version à chaque modif (source des « CSS v85 vs JS v93 » et des caches figés mobile).
        run: |
          SHA="${GITHUB_SHA::7}"
          sed -E -i "s/\?v=[0-9]+/?v=${SHA}/g" front/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: front/
      - uses: actions/deploy-pages@v4
        id: deployment
