<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#16304f">
  <title>SP Track</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="./style.css?v=92">
</head>
<body>
  <div id="app">
    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">SP Track</div>
        <div class="sidebar-sub">App · Analyse</div>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-infos">
        <div class="infos-heure" id="infos-heure">--:--</div>
        <div class="infos-date" id="infos-date">—</div>

        <div class="infos-item">
          <span class="infos-marker" id="infos-meteo-icon">—</span>
          <div>
            <div class="infos-primaire" id="infos-meteo-temp">—</div>
            <div class="infos-secondaire" id="infos-meteo-desc">Météo…</div>
          </div>
        </div>

        <div class="infos-item">
          <span class="infos-marker"><span class="infos-dot" id="infos-marche-dot"></span></span>
          <div>
            <div class="infos-primaire" id="infos-marche-statut">—</div>
            <div class="infos-secondaire" id="infos-marche-autocall">—</div>
          </div>
        </div>
      </div>
    </aside>

    <div id="sidebar-backdrop" onclick="App.toggleSidebar()"></div>

    <!-- ── Main ── -->
    <div id="main">
      <div id="mobile-topbar">
        <button class="btn-hamburger" onclick="App.toggleSidebar()">☰</button>
        <div class="mobile-topbar-title">SP Track</div>
      </div>
      <div id="content" class="scroll"></div>
      <footer id="footer">
        <span class="footer-dot"></span>
        <span class="footer-legal"><b style="color:#6b6253;">Outil interne d'aide à l'analyse.</b> Validation humaine obligatoire · Aucune recommandation personnalisée automatisée · Usage interne uniquement.</span>
      </footer>
    </div>
  </div>

  <div id="modal-root"></div>
  <script src="./data.js?v=100"></script>
  <script src="./feteJour.js?v=100"></script>
  <script src="./api.js?v=100"></script>
  <script src="./autocall.js?v=100"></script>
  <script src="./chart.js?v=100"></script>
  <script src="./pages.js?v=100"></script>
  <script src="./app.js?v=100"></script>
</body>
</html>
